<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 背景渐变 - 参考登录页 LinearGradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D15"/>
      <stop offset="50%" style="stop-color:#0A0A10"/>
      <stop offset="100%" style="stop-color:#080810"/>
    </linearGradient>
    
    <!-- 文字发光效果 - 参考登录页 textShadow -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="0" result="offsetblur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.9"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 光斑效果 -->
    <radialGradient id="glowSpot1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="glowSpot2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#D4A574;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 - 填满整个画布 -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- 光斑装饰 -->
  <ellipse cx="200" cy="300" rx="150" ry="100" fill="url(#glowSpot1)"/>
  <ellipse cx="800" cy="700" rx="180" ry="120" fill="url(#glowSpot2)"/>
  <ellipse cx="500" cy="200" rx="100" ry="80" fill="url(#glowSpot1)" opacity="0.5"/>
  
  <!-- 金色光点装饰 -->
  <circle cx="150" cy="200" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="300" cy="150" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="700" cy="250" r="4" fill="#FFD700" opacity="0.7"/>
  <circle cx="850" cy="400" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="200" cy="600" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="400" cy="750" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="750" cy="800" r="3" fill="#FFD700" opacity="0.5"/>
  <circle cx="900" cy="650" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="100" cy="450" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="600" cy="180" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="450" cy="850" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="820" cy="150" r="3" fill="#FFD700" opacity="0.6"/>
  
  <!-- 主标题 "流痕江湖" - 参考登录页样式 -->
  <!-- fontSize: 42 * 2.5 = 105, fontWeight: bold, color: #FFD700, letterSpacing: 2 -->
  <text 
    x="512" 
    y="512" 
    text-anchor="middle" 
    dominant-baseline="middle"
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="105" 
    font-weight="bold"
    fill="#FFD700"
    letter-spacing="8"
    filter="url(#textGlow)"
  >流痕江湖</text>
  
  <!-- 副标题装饰线（可选） -->
  <line x1="350" y1="580" x2="674" y2="580" stroke="#FFD700" stroke-width="1" opacity="0.3"/>
</svg>
