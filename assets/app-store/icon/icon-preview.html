<!DOCTYPE html>
<html>
<head>
  <title>流痕江湖 应用图标预览</title>
  <style>
    body { 
      margin: 0; 
      padding: 40px; 
      background: #1a1a1a; 
      display: flex; 
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      color: #fff;
    }
    .icon-container {
      width: 512px;
      height: 512px;
    }
    h2 { margin-bottom: 20px; color: #FFD700; }
    .info { margin-top: 20px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h2>流痕江湖 应用图标</h2>
  <div class="icon-container">
    <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
      <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#0D0D15"/>
          <stop offset="50%" style="stop-color:#0A0A10"/>
          <stop offset="100%" style="stop-color:#080810"/>
        </linearGradient>
        <radialGradient id="glow1" cx="30%" cy="25%">
          <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.25"/>
          <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="75%" cy="70%">
          <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.18"/>
          <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
        </radialGradient>
        <filter id="textGlow">
          <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <rect width="1024" height="1024" fill="url(#bgGrad)"/>
      <rect width="1024" height="1024" fill="url(#glow1)"/>
      <rect width="1024" height="1024" fill="url(#glow2)"/>
      <circle cx="180" cy="220" r="3" fill="#FFD700" opacity="0.7"/>
      <circle cx="850" cy="180" r="2.5" fill="#FFD700" opacity="0.6"/>
      <circle cx="720" cy="850" r="3.5" fill="#FFD700" opacity="0.5"/>
      <circle cx="280" cy="780" r="2" fill="#FFD700" opacity="0.7"/>
      <circle cx="920" cy="500" r="2.5" fill="#FFD700" opacity="0.6"/>
      <circle cx="100" cy="600" r="3" fill="#FFD700" opacity="0.5"/>
      <text x="512" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="bold" fill="#FFD700" text-anchor="middle" letter-spacing="8" filter="url(#textGlow)">流痕江湖</text>
    </svg>
  </div>
  <div class="info">
    <p>尺寸：1024 x 1024</p>
    <p>背景：深色渐变（与登录页一致）</p>
    <p>文字：金黄色 #FFD700</p>
  </div>
</body>
</html>
