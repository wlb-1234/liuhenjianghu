<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgGradient)"/>
  
  <!-- Flowing water trace symbol -->
  <g transform="translate(512, 400)">
    <!-- Main flowing curve -->
    <path d="M-200,0 C-150,-80 -50,-100 0,-60 C50,-20 100,40 150,20 C200,0 220,-40 200,-80" 
          stroke="#FFD700" 
          stroke-width="24" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- Secondary flowing curve -->
    <path d="M-180,40 C-130,-40 -30,-60 20,-20 C70,20 120,80 170,60 C220,40 240,0 220,-40" 
          stroke="#FFD700" 
          stroke-width="18" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.8"/>
    
    <!-- Tertiary flowing curve -->
    <path d="M-160,80 C-110,0 -10,-20 40,20 C90,60 140,120 190,100 C240,80 260,40 240,0" 
          stroke="#FFD700" 
          stroke-width="12" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.6"/>
  </g>
</svg>
