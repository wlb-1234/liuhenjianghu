<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 黑黄渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆角矩形背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="url(#bgGradient)"/>
  
  <!-- 三条水纹 - 4个波峰4个波谷 -->
  <!-- 水纹1 -->
  <path d="M 50,380 
           Q 100,340 150,380 T 250,380 T 350,380 T 450,380 T 550,380 T 650,380 T 750,380 T 850,380 T 974,380"
        stroke="#B8860B" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- 水纹2 -->
  <path d="M 50,450 
           Q 100,410 150,450 T 250,450 T 350,450 T 450,450 T 550,450 T 650,450 T 750,450 T 850,450 T 974,450"
        stroke="#B8860B" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- 水纹3 -->
  <path d="M 50,520 
           Q 100,480 150,520 T 250,520 T 350,520 T 450,520 T 550,520 T 650,520 T 750,520 T 850,520 T 974,520"
        stroke="#B8860B" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- 流痕江湖 文字 -->
  <text x="512" y="650" 
        font-family="serif" 
        font-size="72" 
        fill="#DAA520" 
        text-anchor="middle"
        font-weight="normal">流痕江湖</text>
</svg>
